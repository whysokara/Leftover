<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leftover</title>
<style>
  :root {
    --stage: #F7F3EB;
    --ink: #35325E;
    --dim: #8D89A8;
    --accent: #F47D31;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--stage);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    text-align: center;
  }
  .wrap { padding: 20px; }
  h1 {
    font-size: 44px;
    font-weight: 800;
    margin: 0 0 8px;
  }
  p.tagline {
    color: var(--dim);
    font-size: 17px;
    margin: 0 0 28px;
  }
  .links a {
    display: inline-block;
    margin: 0 10px;
    padding: 12px 22px;
    border-radius: 999px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
  }
  .links a.secondary {
    background: white;
    color: var(--ink);
    border: 1px solid #E9E2D5;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Leftover</h1>
    <p class="tagline">Swipe to sort your photo library. Local-only, no accounts, no data collection.</p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a class="secondary" href="support.html">Support</a>
    </div>
  </div>
</body>
</html>
